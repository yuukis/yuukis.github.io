<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aタグ動作テスト</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        
        .test-link {
            display: block;
            margin: 20px 0;
            padding: 15px;
            border: 2px solid #007bff;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        
        .test-link:hover {
            background-color: #007bff;
            color: white;
        }
        
        .normal-link {
            border-color: #28a745;
            color: #28a745;
        }
        
        .normal-link:hover {
            background-color: #28a745;
        }
        
        .description {
            margin-top: 10px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Aタグ動作確認テストページ</h1>
    
    <h2>テスト内容</h2>
    <p>以下の2つのリンクは同じURL（https://www.google.com）へのリンクですが、動作が異なります：</p>
    
    <div>
        <a href="https://www.google.com" class="test-link normal-link">
            通常のAタグ（同じタブで開く）
        </a>
        <div class="description">target指定なし - 現在のタブでページが開きます</div>
    </div>
    
    <div>
        <a href="https://www.google.com" target="_blank" class="test-link">
            target="_blank"指定のAタグ（新しいタブで開く）
        </a>
        <div class="description">target="_blank"指定 - 新しいタブでページが開きます</div>
    </div>
</body>
</html>
